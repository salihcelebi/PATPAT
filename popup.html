<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PATPAT - LOG</title>
  <style>
    body{ font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin:12px; }
    .row{ display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; align-items:center; }
    button{ padding:8px 10px; border:1px solid #ddd; border-radius:10px; background:#fff; cursor:pointer; }
    button.primary{ border-color:#999; font-weight:600; }
    button:disabled{ opacity:.5; cursor:not-allowed; }
    textarea{ width:100%; height:260px; border:1px solid #ddd; border-radius:12px; padding:10px;
              font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size:12px; }
    .meta{ font-size:12px; opacity:.75; }
    .toast{ position:fixed; left:12px; right:12px; bottom:12px; padding:10px 12px; border-radius:12px;
            border:1px solid #ddd; background:#fff; box-shadow:0 10px 30px rgba(0,0,0,.08); display:none; }
  </style>
</head>
<body>
  <div class="row">
    <button id="btnCopy" class="primary">LOGLARI KOPYALA</button>
    <button id="btnPrepare">LOG PAKETİNİ HAZIRLA</button>
    <span class="meta" id="meta"></span>
  </div>

  <textarea id="logBox" readonly></textarea>

  <div class="toast" id="toast"></div>

  <script type="module" src="popup.js"></script>
</body>
</html>
