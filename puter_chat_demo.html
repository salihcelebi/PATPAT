<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Puter Chat Demo</title>
  <!-- Kısa açıklama (~15 kelime): Puter.js CDN ile basit chat arayüzü; cevapları div’e yazar. -->
  <style>
    body{font-family:system-ui,Arial,sans-serif;margin:12px}
    .row{display:flex;gap:8px}
    input{flex:1;padding:10px;border:1px solid #ccc;border-radius:8px}
    button{padding:10px 14px;border:1px solid #ccc;border-radius:8px;cursor:pointer}
    #out{margin-top:10px;padding:10px;border:1px solid #ddd;border-radius:8px;min-height:120px;white-space:pre-wrap}
    .muted{opacity:.7;font-size:12px;margin-top:8px}
  </style>
</head>
<body>
  <h3>Puter.js Chat Demo</h3>

  <div class="row">
    <input id="msg" placeholder="Mesaj yaz..." />
    <button id="send">GÖNDER</button>
  </div>

  <div id="out"></div>
  <div class="muted">
    <!-- API anahtarı gerektirmez: Puter kendi ekosisteminde çalışır. -->
    PUTER.JS CDN: https://js.puter.com/v2/
  </div>

  <script src="https://js.puter.com/v2/"></script>
  <script type="module" src="./puter_chat_demo.js"></script>
</body>
</html>
